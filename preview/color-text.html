<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-bg); }
  .card { padding: 18px 22px; box-sizing: border-box; }
  .swatch-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw {
    width: 124px; box-sizing: border-box;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    overflow: hidden; background: var(--color-surface);
  }
  .sw .chip { height: 56px; }
  .sw .meta { padding: 6px 8px 8px; }
  .sw .name { font-family: var(--font-sans); font-size: 11px; font-weight: 500; color: var(--color-text-primary); }
  .sw .hex  { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); margin-top: 2px;}
  .grouptag { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; margin-bottom: 10px; }
  
.sw .chip { display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-size: 14px; font-weight: 500; background: var(--color-surface); }

</style>
</head>
<body><div class="card">
<div class="grouptag">Text colors — on surface (#FFFFFF)</div>
<div class="swatch-row">
  <div class="sw"><div class="chip" style="color:#18180F">Aa</div><div class="meta"><div class="name">Primary</div><div class="hex">#18180F</div></div></div>
  <div class="sw"><div class="chip" style="color:#5A5950">Aa</div><div class="meta"><div class="name">Secondary</div><div class="hex">#5A5950</div></div></div>
  <div class="sw"><div class="chip" style="color:#97968E">Aa</div><div class="meta"><div class="name">Muted</div><div class="hex">#97968E</div></div></div>
  <div class="sw"><div class="chip" style="color:#C4C2BC">Aa</div><div class="meta"><div class="name">Disabled</div><div class="hex">#C4C2BC</div></div></div>
  <div class="sw" style="background:#18180F"><div class="chip" style="color:#F5F4F0;background:#18180F">Aa</div><div class="meta" style="background:#18180F"><div class="name" style="color:#F5F4F0">Inverse</div><div class="hex" style="color:#97968E">#F5F4F0</div></div></div>
</div></div></body></html>
