<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-bg); }
  .card { padding: 18px 22px; box-sizing: border-box; }
  .grouptag { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; margin-bottom: 12px; }
  
.row { display:flex; gap: 24px; padding: 12px 4px 24px; }
.it { text-align: center; flex: 1; }
.box { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); height: 72px; }
.lbl { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-primary); margin-top: 12px; }
.sub { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); }

</style>
</head>
<body><div class="card">
<div class="grouptag">Shadows — structure via borders, not elevation</div>
<div class="row">
  <div class="it"><div class="box"></div><div class="lbl">shadow-none</div><div class="sub">table rows, default</div></div>
  <div class="it"><div class="box" style="box-shadow:0 1px 2px rgba(15,14,11,0.06)"></div><div class="lbl">shadow-sm</div><div class="sub">cards at rest</div></div>
  <div class="it"><div class="box" style="box-shadow:0 2px 6px rgba(15,14,11,0.08), 0 1px 2px rgba(15,14,11,0.04)"></div><div class="lbl">shadow-md</div><div class="sub">cards on hover</div></div>
  <div class="it"><div class="box" style="box-shadow:0 4px 16px rgba(15,14,11,0.10), 0 2px 4px rgba(15,14,11,0.06)"></div><div class="lbl">shadow-lg</div><div class="sub">modals · tooltips</div></div>
</div></div></body></html>
