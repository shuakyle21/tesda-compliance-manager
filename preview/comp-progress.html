<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-bg); }
  .card { padding: 18px 22px; box-sizing: border-box; }
  .grouptag { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; margin-bottom: 12px; }

  /* shared badge */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    height: 20px; padding: 0 8px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 500; letter-spacing: .04em;
    box-sizing: border-box;
  }
  .badge svg { width: 12px; height: 12px; flex-shrink: 0; }

  .b-ongoing,.b-twsp  { background: var(--color-blue-lt);  color: var(--color-blue-dk); }
  .b-cfsp             { background: var(--color-teal-lt);  color: var(--color-teal-dk); }
  .b-completed,.b-approved,.b-ontrack { background: var(--color-green-lt); color: var(--color-green-dk); }
  .b-upcoming,.b-warning,.b-nc1 { background: var(--color-amber-lt); color: var(--color-amber-dk); }
  .b-cancelled,.b-critical { background: var(--color-red-lt); color: var(--color-red-dk); }
  .b-nc2 { background: var(--color-purple-lt); color: var(--color-purple-dk); }
  .b-not-approved { background: var(--color-surface-alt); color: var(--color-text-muted); border: 1px solid var(--color-border); }

  
.bar-block { margin-bottom: 14px; }
.bar-meta  { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.bar-meta .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-secondary); }
.bar-meta .val { font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.track { height: 6px; background: var(--color-surface-alt); border-radius: 9999px; overflow: hidden; }
.track.complete { background: var(--color-green-lt); }
.fill { height: 100%; border-radius: 9999px; }
.fill-low  { background: var(--color-amber); }
.fill-mid  { background: var(--color-blue); }
.fill-high { background: var(--color-green); }
.tier-tag  { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); margin-top: 3px; }
.mini-row { display: flex; align-items: center; gap: 10px; }
.mini-track { flex: 1; height: 4px; background: var(--color-surface-alt); border-radius: 9999px; overflow: hidden; }

</style>
</head>
<body><div class="card">
<div class="grouptag">Progress bar — color shifts at 25 / 75 / 100%</div>

<div class="bar-block">
  <div class="bar-meta"><span class="lbl">Day 4 of 42</span><span class="val">9%</span></div>
  <div class="track"><div class="fill fill-low" style="width:9%"></div></div>
  <div class="tier-tag">0–24% · amber</div>
</div>

<div class="bar-block">
  <div class="bar-meta"><span class="lbl">Day 22 of 42</span><span class="val">52%</span></div>
  <div class="track"><div class="fill fill-mid" style="width:52%"></div></div>
  <div class="tier-tag">25–74% · blue</div>
</div>

<div class="bar-block">
  <div class="bar-meta"><span class="lbl">Day 35 of 42</span><span class="val">83%</span></div>
  <div class="track"><div class="fill fill-high" style="width:83%"></div></div>
  <div class="tier-tag">75–99% · green</div>
</div>

<div class="bar-block">
  <div class="bar-meta"><span class="lbl">Day 42 of 42</span><span class="val">100%</span></div>
  <div class="track complete"><div class="fill fill-high" style="width:100%"></div></div>
  <div class="tier-tag">complete · green on green-lt</div>
</div>

<div class="mini-row" style="margin-top:10px">
  <span class="bar-meta lbl" style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted)">mini · in-table</span>
  <div class="mini-track"><div class="fill fill-mid" style="width:52%"></div></div>
  <span class="val" style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary)">52%</span>
</div>
</div></body></html>
