<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-bg); }
  .card { padding: 18px 22px; box-sizing: border-box; }
  .grouptag { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; margin-bottom: 12px; }
  
.row { display: flex; align-items: center; gap: 28px; }
.it { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
.bg-light { background: #FFFFFF; border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 18px 22px; }
.bg-paper { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 18px 22px; }
.bg-dark { background: #18180F; border-radius: var(--radius-lg); padding: 18px 22px; }
.lbl { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); }

</style>
</head>
<body><div class="card">
<div class="grouptag">Logo · mark — on white · paper · dark</div>
<div class="row">
  <div class="it"><div class="bg-light"><img src="../assets/logo.svg" height="40" alt="TCS"></div><div class="lbl">logo.svg · on #FFFFFF</div></div>
  <div class="it"><div class="bg-paper"><img src="../assets/logo.svg" height="40" alt="TCS"></div><div class="lbl">on page bg #F5F4F0</div></div>
  <div class="it"><div class="bg-light" style="padding:14px"><img src="../assets/mark.svg" height="40" alt="TCS"></div><div class="lbl">mark only · 40px</div></div>
</div></div></body></html>
