<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-bg); }
  .card { padding: 18px 22px; box-sizing: border-box; }
  .swatch-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw {
    width: 124px; box-sizing: border-box;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    overflow: hidden; background: var(--color-surface);
  }
  .sw .chip { height: 56px; }
  .sw .meta { padding: 6px 8px 8px; }
  .sw .name { font-family: var(--font-sans); font-size: 11px; font-weight: 500; color: var(--color-text-primary); }
  .sw .hex  { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); margin-top: 2px;}
  .grouptag { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; margin-bottom: 10px; }
  
</style>
</head>
<body><div class="card">
<div class="grouptag">Green — completed · approved · on-track</div>
<div class="swatch-row">
    <div class="sw">
      <div class="chip" style="background:#3B6D11"></div>
      <div class="meta"><div class="name">green</div><div class="hex">#3B6D11</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#EAF3DE"></div>
      <div class="meta"><div class="name">green-lt</div><div class="hex">#EAF3DE</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#27500A"></div>
      <div class="meta"><div class="name">green-dk</div><div class="hex">#27500A</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#B5D98A"></div>
      <div class="meta"><div class="name">green-border</div><div class="hex">#B5D98A</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#D5EBB8"></div>
      <div class="meta"><div class="name">green-hover</div><div class="hex">#D5EBB8</div></div>
    </div></div></div></body></html>
