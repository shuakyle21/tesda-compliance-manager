<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-bg); }
  .card { padding: 18px 22px; box-sizing: border-box; }
  .swatch-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw {
    width: 124px; box-sizing: border-box;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    overflow: hidden; background: var(--color-surface);
  }
  .sw .chip { height: 56px; }
  .sw .meta { padding: 6px 8px 8px; }
  .sw .name { font-family: var(--font-sans); font-size: 11px; font-weight: 500; color: var(--color-text-primary); }
  .sw .hex  { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); margin-top: 2px;}
  .grouptag { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; margin-bottom: 10px; }
  
</style>
</head>
<body><div class="card">
<div class="grouptag">Red — critical · &lt;7 days · errors</div>
<div class="swatch-row">
    <div class="sw">
      <div class="chip" style="background:#C81F1F"></div>
      <div class="meta"><div class="name">red</div><div class="hex">#C81F1F</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#FCE4E4"></div>
      <div class="meta"><div class="name">red-lt</div><div class="hex">#FCE4E4</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#8B1414"></div>
      <div class="meta"><div class="name">red-dk</div><div class="hex">#8B1414</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#ED9999"></div>
      <div class="meta"><div class="name">red-border</div><div class="hex">#ED9999</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#F6C2C2"></div>
      <div class="meta"><div class="name">red-hover</div><div class="hex">#F6C2C2</div></div>
    </div></div></div></body></html>
