<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-bg); }
  .card { padding: 18px 22px; box-sizing: border-box; }
  .grouptag { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; margin-bottom: 12px; }
  
.row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; gap: 4px; height: 32px; padding: 0 14px; border-radius: var(--radius-lg); font-family: var(--font-sans); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 150ms cubic-bezier(0.2, 0, 0, 1); }
.btn svg { width: 14px; height: 14px; }
.btn.primary { background: var(--color-blue); color: white; }
.btn.primary:hover { background: var(--color-blue-dk); }
.btn.secondary { background: var(--color-surface); color: var(--color-text-primary); border-color: var(--color-border); }
.btn.secondary:hover { background: var(--color-surface-raised); }
.btn.ghost { background: transparent; color: var(--color-text-secondary); }
.btn.ghost:hover { background: var(--color-surface-alt); color: var(--color-text-primary); }
.btn.danger { background: var(--color-red); color: white; }
.btn.danger:hover { background: var(--color-red-dk); }
.btn.sm { height: 26px; padding: 0 10px; font-size: 12px; }
.btn[disabled] { opacity: 0.5; cursor: not-allowed; }

</style>
</head>
<body><div class="card">
<div class="grouptag">Buttons — primary · secondary · ghost · danger · disabled · sm</div>
<div class="row">
  <button class="btn primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"/><polyline points="7 11 12 16 17 11"/><path d="M12 4v12"/></svg>Export report</button>
  <button class="btn secondary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11A8.1 8.1 0 0 0 4.5 9M4 5v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/></svg>Re-sync</button>
  <button class="btn ghost">Cancel</button>
  <button class="btn danger">Mark cancelled</button>
  <button class="btn primary" disabled>Submit billing</button>
  <button class="btn sm secondary">View details</button>
</div></div></body></html>
