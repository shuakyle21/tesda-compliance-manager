<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-bg); }
  .card { padding: 18px 22px; box-sizing: border-box; }
  .swatch-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw {
    width: 124px; box-sizing: border-box;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    overflow: hidden; background: var(--color-surface);
  }
  .sw .chip { height: 56px; }
  .sw .meta { padding: 6px 8px 8px; }
  .sw .name { font-family: var(--font-sans); font-size: 11px; font-weight: 500; color: var(--color-text-primary); }
  .sw .hex  { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); margin-top: 2px;}
  .grouptag { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; margin-bottom: 10px; }
  
</style>
</head>
<body><div class="card">
<div class="grouptag">Neutrals — surfaces & borders</div>
<div class="swatch-row">
    <div class="sw">
      <div class="chip" style="background:#F5F4F0"></div>
      <div class="meta"><div class="name">Bg page</div><div class="hex">#F5F4F0</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#FFFFFF"></div>
      <div class="meta"><div class="name">Surface</div><div class="hex">#FFFFFF</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#EEECEA"></div>
      <div class="meta"><div class="name">Surface alt</div><div class="hex">#EEECEA</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#FAF9F6"></div>
      <div class="meta"><div class="name">Surf raised</div><div class="hex">#FAF9F6</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#E8E6E2"></div>
      <div class="meta"><div class="name">Border faint</div><div class="hex">#E8E6E2</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#D8D6D0"></div>
      <div class="meta"><div class="name">Border</div><div class="hex">#D8D6D0</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#B0AEA8"></div>
      <div class="meta"><div class="name">Border strong</div><div class="hex">#B0AEA8</div></div>
    </div></div></div></body></html>
