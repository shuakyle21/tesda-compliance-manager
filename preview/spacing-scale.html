<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-bg); }
  .card { padding: 18px 22px; box-sizing: border-box; }
  .grouptag { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; margin-bottom: 12px; }
  
.row { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
.tok { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-muted); width: 78px; }
.px  { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-secondary); width: 40px; }
.bar { height: 12px; background: var(--color-blue); border-radius: 2px; }

</style>
</head>
<body><div class="card">
<div class="grouptag">Spacing — 4px base unit</div>

  <div class="row"><span class="tok">space-0.5</span><span class="px">2px</span><span class="bar" style="width:2px"></span></div>
  <div class="row"><span class="tok">space-1</span><span class="px">4px</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="tok">space-2</span><span class="px">8px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="tok">space-3</span><span class="px">12px</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="tok">space-4</span><span class="px">16px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="tok">space-5</span><span class="px">20px</span><span class="bar" style="width:20px"></span></div>
  <div class="row"><span class="tok">space-6</span><span class="px">24px</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="tok">space-8</span><span class="px">32px</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="tok">space-10</span><span class="px">40px</span><span class="bar" style="width:40px"></span></div>
  <div class="row"><span class="tok">space-12</span><span class="px">48px</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="tok">space-16</span><span class="px">64px</span><span class="bar" style="width:64px"></span></div>
</div></body></html>
