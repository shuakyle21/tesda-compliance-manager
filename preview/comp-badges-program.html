<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-bg); }
  .card { padding: 18px 22px; box-sizing: border-box; }
  .grouptag { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; margin-bottom: 12px; }

  /* shared badge */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    height: 20px; padding: 0 8px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 500; letter-spacing: .04em;
    box-sizing: border-box;
  }
  .badge svg { width: 12px; height: 12px; flex-shrink: 0; }

  .b-ongoing,.b-twsp  { background: var(--color-blue-lt);  color: var(--color-blue-dk); }
  .b-cfsp             { background: var(--color-teal-lt);  color: var(--color-teal-dk); }
  .b-completed,.b-approved,.b-ontrack { background: var(--color-green-lt); color: var(--color-green-dk); }
  .b-upcoming,.b-warning,.b-nc1 { background: var(--color-amber-lt); color: var(--color-amber-dk); }
  .b-cancelled,.b-critical { background: var(--color-red-lt); color: var(--color-red-dk); }
  .b-nc2 { background: var(--color-purple-lt); color: var(--color-purple-dk); }
  .b-not-approved { background: var(--color-surface-alt); color: var(--color-text-muted); border: 1px solid var(--color-border); }

  
.row { display: flex; gap: 8px; flex-wrap: wrap; }

</style>
</head>
<body><div class="card">
<div class="grouptag">Badges — program & lifecycle</div>
<div class="row">
  <span class="badge b-twsp">TWSP</span>
  <span class="badge b-cfsp">CFSP</span>
  <span class="badge b-nc2">NC II</span>
  <span class="badge b-nc1">NC I</span>
  <span class="badge b-ongoing">ONGOING</span>
  <span class="badge b-completed">COMPLETED</span>
  <span class="badge b-upcoming">UPCOMING</span>
  <span class="badge b-cancelled">CANCELLED</span>
  <span class="badge b-approved">BSRS APPROVED</span>
  <span class="badge b-not-approved">NOT APPROVED</span>
</div></div></body></html>
