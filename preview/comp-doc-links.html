<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-bg); }
  .card { padding: 18px 22px; box-sizing: border-box; }
  .grouptag { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; margin-bottom: 12px; }
  
.list { display: flex; flex-direction: column; }
.dl { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--color-border-faint); font-size: 13px; }
.dl:last-child { border-bottom: none; }
.dl .icon { color: var(--color-blue); width: 14px; height: 14px; flex-shrink: 0; }
.dl .ext { color: var(--color-text-muted); width: 12px; height: 12px; margin-left: auto; }
.dl .lbl { color: var(--color-text-secondary); }
.dl.missing .lbl { color: var(--color-text-muted); font-style: italic; }
.dl.missing .icon { color: var(--color-text-muted); }

</style>
</head>
<body><div class="card">
<div class="grouptag">Document link rows</div>
<div class="list">
  <div class="dl">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1 -2 -2V5a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z"/></svg>
    <span class="lbl">Training Plan — BAT-1 Cookery NC II</span>
    <svg class="ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6H6a2 2 0 0 0 -2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-6"/><path d="M11 13l9 -9"/><polyline points="15 4 20 4 20 9"/></svg>
  </div>
  <div class="dl">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1 -2 -2V5a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z"/></svg>
    <span class="lbl">NTP Receipt — Apr 15, 2026</span>
    <svg class="ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6H6a2 2 0 0 0 -2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-6"/><path d="M11 13l9 -9"/><polyline points="15 4 20 4 20 9"/></svg>
  </div>
  <div class="dl missing">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M7 3h7l5 5v7m0 4a2 2 0 0 1 -2 2H7a2 2 0 0 1 -2 -2V7"/></svg>
    <span class="lbl">Assessment Report — not yet linked</span>
  </div>
</div></div></body></html>
