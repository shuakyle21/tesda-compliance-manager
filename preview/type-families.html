<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-bg); }
  .card { padding: 20px 22px; box-sizing: border-box; }
  
.row { display: flex; gap: 32px; align-items: flex-end; }
.col { flex: 1; }
.tag { font-size: 11px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; font-weight: 500; }
.sans-spec { font-family: var(--font-sans); font-size: 36px; font-weight: 500; color: var(--color-text-primary); letter-spacing: -0.01em; line-height: 1.05; }
.sans-sub  { font-family: var(--font-sans); font-size: 13px; color: var(--color-text-secondary); margin-top: 6px; }
.mono-spec { font-family: var(--font-mono); font-size: 32px; font-weight: 500; color: var(--color-text-primary); line-height: 1.05; }
.mono-sub  { font-family: var(--font-mono); font-size: 12px; color: var(--color-text-secondary); margin-top: 6px; }

</style>
</head>
<body><div class="card">
<div class="row">
  <div class="col">
    <div class="tag">IBM Plex Sans</div>
    <div class="sans-spec">Training Batch</div>
    <div class="sans-sub">UI · body · headings · navigation · labels</div>
  </div>
  <div class="col">
    <div class="tag">IBM Plex Mono</div>
    <div class="mono-spec">BAT-1 · 71.4%</div>
    <div class="mono-sub">IDs · dates · % · NC II · Day 31 of 42</div>
  </div>
</div></div></body></html>
