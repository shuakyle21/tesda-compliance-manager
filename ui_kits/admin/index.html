<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Training Compliance System — Admin Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="kit.css">
<link rel="icon" type="image/svg+xml" href="../../assets/mark.svg">
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data -->
<script src="data.js"></script>

<!-- Components (must load BEFORE App.jsx, in dependency order) -->
<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="StatusBadge.jsx"></script>
<script type="text/babel" src="ProgressBar.jsx"></script>
<script type="text/babel" src="MetricCard.jsx"></script>
<script type="text/babel" src="TrainerAvatar.jsx"></script>
<script type="text/babel" src="UrgencyIndicator.jsx"></script>
<script type="text/babel" src="LifecyclePipeline.jsx"></script>
<script type="text/babel" src="BatchCard.jsx"></script>
<script type="text/babel" src="InfoCallout.jsx"></script>
<script type="text/babel" src="TabBar.jsx"></script>
<script type="text/babel" src="Misc.jsx"></script>
<script type="text/babel" src="Charts.jsx"></script>
<script type="text/babel" src="App.jsx"></script>

<script type="text/babel" data-presets="env,react">
  // Wait until all Babel-transpiled scripts have evaluated and window.App is registered.
  function mount() {
    if (!window.App) { return setTimeout(mount, 30); }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<window.App />);
  }
  mount();
</script>
</body>
</html>
